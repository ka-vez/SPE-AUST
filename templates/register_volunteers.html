{% extends 'base.html' %}
{% block content %}
    <link rel="stylesheet" href="{{ url_for ('static', path='css/register.css') }}">

  
    <style>
        /* Purple Navbar */
        .navbar {
            background-color: #6222CC !important;
        }
        
        .navbar .navbar-brand,
        .navbar .nav-link {
            color: white !important;
        }
        
        .navbar .nav-link:hover {
            color: #FBA504 !important;
        }
        
        .navbar-toggler-icon {
            filter: brightness(0) invert(1);
        }
        
        /* Make SPE white and AUST orange on mobile */
        @media (max-width: 991.98px) {
            .navbar-brand h1 {
                color: white !important;
            }
            .navbar-brand h1 span {
                color: orange !important;
            }
        }
        
        /* Center heading */
        .container h1 {
            text-align: center;
        }
        
        /* Better Submit Button */
        button[type="submit"] {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #6222CC 0%, #FBA504 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(98, 34, 204, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(98, 34, 204, 0.4);
        }
        
        button[type="submit"]:active {
            transform: translateY(0);
        }
    </style>

    <br><br><br><br><br><br>
    
    <div class="container">
        <h1>Student SPE Registration</h1>
        <form method="post" id="registrationForm" action="/api/register-volunteers">
            <div class="form-group">
                <label for="full_name">Full Name:</label>
                <input type="text" id="full_name" name="full_name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone_number">Phone Number:</label>
                <input type="tel" id="phone_number" name="phone_number" required>
            </div>
            <div class="form-group">
                <label for="home_address">Home Address:</label>
                <textarea id="home_address" name="home_address" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="state_of_origin">State of Origin:</label>
                <select id="state_of_origin" name="state_of_origin" required>
                    <option value="">Select your state</option>
                    <option value="Abia">Abia</option>
                    <option value="Adamawa">Adamawa</option>
                    <option value="Akwa Ibom">Akwa Ibom</option>
                    <option value="Anambra">Anambra</option>
                    <option value="Bauchi">Bauchi</option>
                    <option value="Bayelsa">Bayelsa</option>
                    <option value="Benue">Benue</option>
                    <option value="Borno">Borno</option>
                    <option value="Cross River">Cross River</option>
                    <option value="Delta">Delta</option>
                    <option value="Ebonyi">Ebonyi</option>
                    <option value="Edo">Edo</option>
                    <option value="Ekiti">Ekiti</option>
                    <option value="Enugu">Enugu</option>
                    <option value="FCT">Federal Capital Territory</option>
                    <option value="Gombe">Gombe</option>
                    <option value="Imo">Imo</option>
                    <option value="Jigawa">Jigawa</option>
                    <option value="Kaduna">Kaduna</option>
                    <option value="Kano">Kano</option>
                    <option value="Katsina">Katsina</option>
                    <option value="Kebbi">Kebbi</option>
                    <option value="Kogi">Kogi</option>
                    <option value="Kwara">Kwara</option>
                    <option value="Lagos">Lagos</option>
                    <option value="Nasarawa">Nasarawa</option>
                    <option value="Niger">Niger</option>
                    <option value="Ogun">Ogun</option>
                    <option value="Ondo">Ondo</option>
                    <option value="Osun">Osun</option>
                    <option value="Oyo">Oyo</option>
                    <option value="Plateau">Plateau</option>
                    <option value="Rivers">Rivers</option>
                    <option value="Sokoto">Sokoto</option>
                    <option value="Taraba">Taraba</option>
                    <option value="Yobe">Yobe</option>
                    <option value="Zamfara">Zamfara</option>
                </select>
            </div>
            <input type="hidden" name="is_web" value="true">
            <br><br>
            <button type="submit">Submit</button>
        </form>

        <div id="message" class="message"></div>
    </div>

{% endblock %}
