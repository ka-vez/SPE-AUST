<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon -->
    <link href="{{ url_for('static', path='/img/favicon.png') }}" rel="icon" />
    <link rel="stylesheet" href="{{ url_for ('static', path='css/register.css') }}">
    <title>Volunteers Register</title>
</head>
<body>
    
    <div class="container">
        <h1>Student SPE Registration</h1>
        <form method="post" id="registrationForm" action="/api/register-volunteers">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone_no">Phone Number:</label>
                <input type="tel" id="phone_number" name="phone_number" required>
            </div>
            <div class="form-group">
                <label for="first_name">First Name:</label>
                <input type="text" id="first_name" name="first_name" required>
            </div>
            <div class="form-group">
                <label for="last_name">Last Name:</label>
                <input type="text" id="last_name" name="last_name" required>
            </div>
            <div class="form-group">
                <label for="degree_program">Department:</label>
                <input type="text" id="degree_program" name="department" required>
            </div>
            <div class="form-group">
                <label for="other_info">Other Information:</label>
                <textarea id="other_info" name="other_information" rows="4"></textarea>
            </div>
            <input type="hidden" name="is_web" value="true">
            <button type="submit">Submit</button>
        </form>

        <div id="message" class="message"></div>
    </div>

</body>
</html>
