<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SPE AUST</title>
    <!-- Favicon -->
    <link href="{{ url_for('static', path='/img/favicon.png') }}" rel="icon" />

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500&amp;family=Jost:wght@500;600;700&amp;display=swap" rel="stylesheet"/>

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet"/>

    <!-- Libraries Stylesheet -->
    <link href="{{ url_for('static', path='lib/animate/animate.min.css') }}" rel="stylesheet" />
    <link href="{{ url_for('static', path='lib/owlcarousel/assets/owl.carousel.min.css') }}" rel="stylesheet"/>
    <link href="{{ url_for('static', path='lib/lightbox/css/lightbox.min.css') }}" rel="stylesheet"/>

    <!-- Customized Bootstrap Stylesheet -->
    <link href="{{ url_for('static', path='css/bootstrap.min.css') }}" rel="stylesheet" />

    <!-- Template Stylesheet -->
    <link href="{{ url_for('static', path='css/style.css') }}" rel="stylesheet" />
    
    <style>
      /* Small flash/toast for successful registration */
      #flash-message {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.85);
        color: #fff;
        padding: 10px 18px;
        border-radius: 8px;
        z-index: 2000;
        display: none;
        font-weight: 600;
        box-shadow: 0 6px 18px rgba(0,0,0,0.2);
      }
    </style>
  </head>
  <body data-registered="{{ 'true' if registered else 'false' }}">

  <div class="container-fluid bg-white p-0">
    {% include 'includes/header.html' %}
    {% block content %}
    {% endblock %}
    {% include 'includes/footer.html' %}
  </div>

  <!-- Flash message element -->
  <div id="flash-message">Registered Successfully</div>


  <!-- JavaScript Libraries -->
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', path='lib/wow/wow.min.j') }}"></script>
  <script src="{{ url_for('static', path='lib/easing/easing.min.js') }}"></script>
  <script src="{{ url_for('static', path='lib/waypoints/waypoints.min.js') }}"></script>
  <script src="{{ url_for('static', path='lib/counterup/counterup.min.js') }}"></script>
  <script src="{{ url_for('static', path='lib/owlcarousel/owl.carousel.min.js') }}"></script>
  <script src="{{ url_for('static', path='lib/isotope/isotope.pkgd.min.js') }}"></script>
  <script src="{{ url_for('static', path='lib/lightbox/js/lightbox.min.js') }}"></script>
  <!-- Template Javascript -->
  <script src="{{ url_for('static', path='js/main.js') }}"></script>
  <script>
    // Show flash message when redirected after registration
    (function(){
      try {
        const registered = document.body.dataset.registered === 'true';
        if (registered) {
          const flash = document.getElementById('flash-message');
          flash.style.display = 'block';
          // hide after 3 seconds
          setTimeout(() => {
            flash.style.display = 'none';
            // remove query param from URL without reloading
            if (window.history && window.history.replaceState) {
              const url = new URL(window.location);
              url.searchParams.delete('registered');
              window.history.replaceState({}, document.title, url.pathname + url.search);
            }
          }, 5000);
        }
      } catch (e) {
        // ignore
      }
    })();
  </script>
   
</body>
</html>
