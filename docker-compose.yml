version: '3.8'

services:
  web:
    build: .
    container_name: spe-app
    ports:
      - "8000:8000"
    environment:
      - SEVALA_DB_URL=${SEVALA_DB_URL}
    env_file:
      - .env
    volumes:
      - ./media:/app/media
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
